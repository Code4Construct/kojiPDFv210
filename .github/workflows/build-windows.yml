name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-installer:
    name: Build kojiPDF_Setup_2.1.0.exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Build standalone app with Nuitka
        shell: cmd
        run: build_nuitka.bat

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Build installer with Inno Setup
        shell: powershell
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe was not found at $iscc"
          }
          & $iscc "installer\kojiPDF.iss"

      - name: Verify installer output
        shell: powershell
        run: |
          $installer = "installer\output\kojiPDF_Setup_2.1.0.exe"
          if (-not (Test-Path $installer)) {
            throw "Installer was not generated: $installer"
          }
          Get-Item $installer | Select-Object FullName, Length, LastWriteTime

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: kojiPDF_Setup_2.1.0
          path: installer/output/kojiPDF_Setup_2.1.0.exe
          if-no-files-found: error
